<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI','Malgun Gothic',sans-serif;background:#F8FAFB;color:#1A1A1A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.06);}
.brand{font-size:18px;font-weight:800;letter-spacing:-.5px;}
.brand span{color:#8B95A1;font-weight:500;font-size:14px;margin-left:6px;}
.sub{color:#4B5563;font-size:13px;margin:6px 0 24px;}
label{display:block;font-size:12px;font-weight:600;color:#4B5563;margin-bottom:6px;}

input:focus{border-color:#1B7E3E;}
button{width:100%;margin-top:16px;padding:12px;background:#1B7E3E;color:#fff;border:none;border-radius:5px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;}
button:hover{background:#0F5A29;}
button:disabled{opacity:.6;cursor:wait;}
.err{color:#C62828;font-size:13px;margin-top:12px;min-height:18px;font-weight:500;}
.foot{margin-top:22px;padding-top:16px;border-top:1px solid #F1F3F5;font-size:11px;color:#8B95A1;line-height:1.6;}
</style>
</head>

const SS_KEY = "ca_auth_v1";

function b64(b){const s=atob(b);const u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
function hexb(h){const u=new Uint8Array(h.length/2);for(let i=0;i<u.length;i++)u[i]=parseInt(h.substr(i*2,2),16);return u;}

async function deriveKey(pw,salt,iter){
  const pk=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveBits"]);
  const bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt:salt,iterations:iter,hash:"SHA-256"},pk,256);
  return new Uint8Array(bits);
}
async function keystream(key,n){
  const out=new Uint8Array(n);let off=0,c=0;
  while(off<n){
    const buf=new Uint8Array(key.length+8);buf.set(key,0);
    const dv=new DataView(buf.buffer);
    dv.setUint32(key.length,Math.floor(c/4294967296));
    dv.setUint32(key.length+4,c>>>0);
    const h=new Uint8Array(await crypto.subtle.digest("SHA-256",buf));
    for(let i=0;i<h.length&&off<n;i++,off++)out[off]=h[i];
    c++;
  }
  return out;
}
async function decrypt(pw){
  const salt=hexb(ENC.salt),ct=b64(ENC.ct),tag=b64(ENC.tag);
  const key=await deriveKey(pw,salt,ENC.iter);
  const hk=await crypto.subtle.importKey("raw",key,{name:"HMAC",hash:"SHA-256"},false,["verify"]);
  const ok=await crypto.subtle.verify("HMAC",hk,tag,ct);
  if(!ok) return null;
  const ks=await keystream(key,ct.length);
  const pt=new Uint8Array(ct.length);
  for(let i=0;i<ct.length;i++)pt[i]=ct[i]^ks[i];
  return new TextDecoder("utf-8").decode(pt);
}
function render(html){document.open();document.write(html);document.close();}

const btn=document.getElementById("btn"),pw=document.getElementById("pw"),err=document.getElementById("err");
async function attempt(p,fromSaved){
  try{
    const html=await decrypt(p);
    if(html){ sessionStorage.setItem(SS_KEY,p); render(html); return true; }
    if(!fromSaved){ err.textContent="비밀번호가 올바르지 않습니다."; pw.value=""; pw.focus(); }
    return false;
  }catch(e){ err.textContent="오류: "+e.message; return false; }
}
async function submit(){
  if(!pw.value){ err.textContent="비밀번호를 입력하세요."; return; }
  btn.disabled=true; btn.textContent="확인 중…"; err.textContent="";
  const ok=await attempt(pw.value,false);
  if(!ok){ btn.disabled=false; btn.textContent="열람하기"; }
}
btn.addEventListener("click",submit);
pw.addEventListener("keydown",e=>{if(e.key==="Enter")submit();});
// 같은 세션 내 재방문/페이지 이동 시 자동 복호화
(async()=>{const saved=sessionStorage.getItem(SS_KEY);if(saved){const ok=await attempt(saved,true);if(!ok)sessionStorage.removeItem(SS_KEY);}})();
</script>
